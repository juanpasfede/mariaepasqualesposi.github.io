<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Maria & Pasquale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #d4af37;
            --secondary: #fdfbf7;
            --text: #2c3e50;
        }
        body { font-family: 'Lato', sans-serif; color: var(--text); background-color: var(--secondary); overflow-x: hidden; }
        .no-scroll { overflow: hidden !important; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-cursive { font-family: 'Great Vibes', cursive; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 bg-[#fdfbf7] shadow-md">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-20 flex justify-between items-center bg-[#fdfbf7]">
            
            <a href="index.html" class="flex items-center text-yellow-700 hover:text-yellow-800 transition w-1/3">
                <i data-lucide="arrow-left" class="w-5 h-5 mr-2"></i>
                <span class="uppercase tracking-widest text-[10px] md:text-xs font-bold hidden sm:inline" data-i18n="nav_back_home">Torna alla Home</span>
                <span class="uppercase tracking-widest text-[10px] font-bold sm:hidden" data-i18n="nav_back_home_short">Home</span>
            </a>
            
            <span class="font-cursive text-3xl text-yellow-700 text-center w-1/3">M & P</span>
            
            <div class="flex justify-end space-x-2 md:space-x-3 text-[10px] md:text-xs font-bold w-1/3">
                <button onclick="selectLanguage('it')" class="hover:text-yellow-700 transition outline-none">IT</button>
                <button onclick="selectLanguage('en')" class="hover:text-yellow-700 transition outline-none">EN</button>
                <button onclick="selectLanguage('es')" class="hover:text-yellow-700 transition outline-none">ES</button>
                <button onclick="selectLanguage('fr')" class="hover:text-yellow-700 transition outline-none">FR</button>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-12 text-center px-4">
        <h1 class="text-yellow-700 font-serif text-4xl italic mb-4" data-i18n="gallery_title">I Nostri Ricordi</h1>
        <p class="text-gray-600 italic" data-i18n="gallery_desc">I momenti più belli della nostra storia, aspettando il grande giorno.</p>
    </section>

    <main class="max-w-7xl mx-auto px-4 pb-24">
        <div id="masonry-grid" class="columns-1 sm:columns-2 md:columns-3 lg:columns-4 gap-6">
            </div>
    </main>

    <div id="lightbox" class="fixed top-0 left-0 w-screen h-[100dvh] z-[100] bg-black/95 hidden flex-col items-center justify-center p-4 backdrop-blur-sm transition-opacity duration-300 opacity-0">
        <button id="close-btn" class="absolute top-6 right-6 text-white hover:text-yellow-500 transition z-50">
            <i data-lucide="x" class="w-10 h-10"></i>
        </button>
        
        <img id="lightbox-img" src="" class="max-w-full max-h-[90vh] m-auto object-contain rounded-md shadow-2xl relative z-40">
        
        <div class="absolute bottom-8 right-8 md:bottom-12 md:right-12 bg-white/90 backdrop-blur px-4 py-2 rounded-full shadow-lg flex items-center space-x-3 z-50">
            <button id="lightbox-heart-btn">
                <i data-lucide="heart" class="w-7 h-7 text-gray-400 hover:text-red-500 transition"></i>
            </button>
            <span id="lightbox-count" class="text-lg font-bold text-gray-700">0</span>
        </div>
    </div>


    <script>
        const translations = {
            it: {
                nav_back_home: "Torna alla Home",
                nav_back_home_short: "Home",
                gallery_title: "I Nostri Ricordi",
                gallery_desc: "I momenti più belli della nostra storia, aspettando il grande giorno."
            },
            en: {
                nav_back_home: "Back to Home",
                nav_back_home_short: "Home",
                gallery_title: "Our Memories",
                gallery_desc: "The most beautiful moments of our story, waiting for the big day."
            },
            es: {
                nav_back_home: "Volver al Inicio",
                nav_back_home_short: "Inicio",
                gallery_title: "Nuestros Recuerdos",
                gallery_desc: "Los momentos más hermosos de nuestra historia, esperando el gran día."
            },
            fr: {
                nav_back_home: "Retour à l'Accueil",
                nav_back_home_short: "Accueil",
                gallery_title: "Nos Souvenirs",
                gallery_desc: "Les plus beaux moments de notre histoire, en attendant le grand jour."
            }
        };

        function changeLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    el.innerHTML = translations[lang][key];
                }
            });
            localStorage.setItem('preferredLang', lang);
        }

        function selectLanguage(lang) {
            changeLanguage(lang);
        }

        // Avvio lingua automatica
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('preferredLang') || 'it';
            changeLanguage(savedLang);
        });
    </script>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFKvgs8IV5gg_5fc9T_NUa8gWeUZa9QQg",
            authDomain: "matrimonio-gallery.firebaseapp.com",
            projectId: "matrimonio-gallery",
            storageBucket: "matrimonio-gallery.firebasestorage.app",
            messagingSenderId: "739126728073",
            appId: "1:739126728073:web:72f61c578111abd0983d58",
            measurementId: "G-0ZQQ7ZPDJZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('close-btn');
        const lightboxHeartBtn = document.getElementById('lightbox-heart-btn');
        const lightboxCount = document.getElementById('lightbox-count');

        function openLightbox(imageSrc, gridHeartBtn, gridCountSpan) {
            if (!gridHeartBtn || !gridCountSpan) return; 

            lightboxImg.src = imageSrc;
            lightbox.classList.remove('hidden');
            lightbox.classList.add('flex');
            
            lightboxCount.innerText = gridCountSpan.innerText;
            
            const gridIcon = gridHeartBtn.querySelector('svg');
            const lightboxIcon = lightboxHeartBtn.querySelector('svg');
            
            if(gridIcon && lightboxIcon) {
                lightboxIcon.setAttribute('class', gridIcon.getAttribute('class'));
                if (gridIcon.hasAttribute('fill')) {
                    lightboxIcon.setAttribute('fill', gridIcon.getAttribute('fill'));
                } else {
                    lightboxIcon.removeAttribute('fill');
                }
            }

            lightboxHeartBtn.onclick = (e) => {
                e.stopPropagation();
                gridHeartBtn.click();
                
                setTimeout(() => {
                    lightboxCount.innerText = gridCountSpan.innerText;
                    if(gridIcon && lightboxIcon) {
                        lightboxIcon.setAttribute('class', gridIcon.getAttribute('class'));
                        if (gridIcon.hasAttribute('fill')) {
                            lightboxIcon.setAttribute('fill', gridIcon.getAttribute('fill'));
                        } else {
                            lightboxIcon.removeAttribute('fill');
                        }
                    }
                }, 100);
            };

            setTimeout(() => lightbox.classList.remove('opacity-0'), 10);
            document.body.classList.add('no-scroll');
        }

        function closeLightbox() {
            lightbox.classList.add('opacity-0');
            setTimeout(() => {
                lightbox.classList.remove('flex');
                lightbox.classList.add('hidden');
                document.body.classList.remove('no-scroll');
            }, 300);
        }

        closeBtn.onclick = closeLightbox;
        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };

        const grid = document.getElementById('masonry-grid');
        const totalImages = 85; 

        for (let i = 1; i <= totalImages; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = "relative mb-6 break-inside-avoid group";

            const img = document.createElement('img');
            img.src = `gallery/gallery_${i}.jpg`;
            img.loading = "lazy";
            img.className = "w-full rounded-lg shadow-md object-cover cursor-pointer hover:shadow-xl transition-shadow duration-300";

            const reactBar = document.createElement('div');
            reactBar.className = "absolute bottom-3 right-3 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full shadow-lg flex items-center space-x-2 transition-opacity duration-300 md:opacity-0 md:group-hover:opacity-100";

            const heartBtn = document.createElement('button');
            heartBtn.innerHTML = `<i data-lucide="heart" class="w-5 h-5 text-gray-400 hover:text-red-500 transition"></i>`;
            
            const countSpan = document.createElement('span');
            countSpan.className = "text-sm font-bold text-gray-700";
            countSpan.innerText = "0";

            img.onclick = () => openLightbox(img.src, heartBtn, countSpan);

            reactBar.appendChild(heartBtn);
            reactBar.appendChild(countSpan);
            wrapper.appendChild(img);
            wrapper.appendChild(reactBar);
            grid.appendChild(wrapper);

            const imgRef = doc(db, "foto_likes", `gallery_${i}`);
            const storageKey = `liked_gallery_${i}`; 
            let hasLiked = localStorage.getItem(storageKey) === 'true';

            getDoc(imgRef).then((docSnap) => {
                if (docSnap.exists()) {
                    const likes = docSnap.data().likes || 0;
                    countSpan.innerText = likes;
                    if(likes > 0 || hasLiked) {
                        reactBar.classList.remove('md:opacity-0', 'md:group-hover:opacity-100');
                    }
                    if(hasLiked) {
                        setTimeout(() => {
                            const icon = heartBtn.querySelector('svg');
                            if(icon) {
                                icon.classList.remove('text-gray-400');
                                icon.classList.add('text-red-500', 'fill-red-500');
                            }
                        }, 150);
                    }
                }
            });

            heartBtn.onclick = async (e) => {
                e.stopPropagation(); 
                const icon = heartBtn.querySelector('svg');
                let currentCount = parseInt(countSpan.innerText) || 0;
                const docSnap = await getDoc(imgRef);
                const exists = docSnap.exists();

                if (hasLiked) {
                    icon.classList.remove('text-red-500', 'fill-red-500');
                    icon.classList.add('text-gray-400');
                    icon.setAttribute('fill', 'none'); 
                    countSpan.innerText = Math.max(0, currentCount - 1);
                    if (countSpan.innerText === "0") reactBar.classList.add('md:opacity-0', 'md:group-hover:opacity-100');
                    localStorage.removeItem(storageKey);
                    hasLiked = false;
                    if (exists) await updateDoc(imgRef, { likes: increment(-1) });
                } else {
                    icon.classList.remove('text-gray-400');
                    icon.classList.add('text-red-500', 'fill-red-500');
                    icon.removeAttribute('fill');
                    reactBar.classList.remove('md:opacity-0', 'md:group-hover:opacity-100');
                    countSpan.innerText = currentCount + 1;
                    localStorage.setItem(storageKey, 'true');
                    hasLiked = true;
                    if (exists) await updateDoc(imgRef, { likes: increment(1) });
                    else await setDoc(imgRef, { likes: 1 });
                }
            };
        }
        setTimeout(() => lucide.createIcons(), 200);
    </script>
</body>
</html>
